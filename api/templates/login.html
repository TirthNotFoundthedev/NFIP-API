<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFIP Gatekeeper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <div class="bg-gray-800 p-10 rounded-3xl shadow-2xl border border-gray-700 text-center">
            <h1 class="text-3xl font-bold text-blue-400 mb-2 tracking-tight">Gatekeeper</h1>
            <p class="text-gray-400 text-sm mb-8 italic">Restricted Access only for NF's Informer Protocol</p>
            
            <form action="/login" method="POST" class="space-y-6 text-left">
                {% if error %}
                    <div class="bg-red-900/50 text-red-300 p-3 rounded-lg text-xs border border-red-800 text-center">
                        {{ error }}
                    </div>
                {% endif %}
                
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Master Password</label>
                    <input type="password" name="password" required class="w-full bg-gray-700 rounded-xl px-4 py-4 border border-gray-600 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
                </div>
                
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-white shadow-lg transition-all transform hover:-translate-y-1">Authorize Session</button>
            </form>
            
            <div id="passkey-section" class="mt-8 pt-8 border-t border-gray-700">
                <button onclick="loginWithPasskey()" class="w-full bg-gray-700 hover:bg-gray-600 py-4 rounded-xl font-bold text-white shadow-lg transition-all transform hover:-translate-y-1 flex items-center justify-center gap-3">
                    <span class="text-xl">🛡️</span> Passkey Login
                </button>
            </div>
        </div>
    </div>

    <script>
        async function loginWithPasskey() {
            try {
                const resp = await fetch('/auth/login/options');
                const options = await resp.json();
                
                // Convert base64 strings back to Uint8Arrays
                options.challenge = Uint8Array.from(atob(options.challenge.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0));
                if (options.allowCredentials) {
                    options.allowCredentials.forEach(c => {
                        c.id = Uint8Array.from(atob(c.id.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0));
                    });
                }

                const assertion = await navigator.credentials.get({ publicKey: options });
                
                const bufferToBase64 = (buffer) => btoa(String.fromCharCode(...new Uint8Array(buffer))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');

                const body = {
                    id: assertion.id,
                    rawId: bufferToBase64(assertion.rawId),
                    type: assertion.type,
                    response: {
                        authenticatorData: bufferToBase64(assertion.response.authenticatorData),
                        clientDataJSON: bufferToBase64(assertion.response.clientDataJSON),
                        signature: bufferToBase64(assertion.response.signature),
                        userHandle: assertion.response.userHandle ? bufferToBase64(assertion.response.userHandle) : null,
                    }
                };

                const verifyResp = await fetch('/auth/login/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (verifyResp.ok) {
                    window.location.href = '/settings';
                } else {
                    const errData = await verifyResp.json();
                    alert('Passkey Verification Failed: ' + (errData.detail || 'Unknown error'));
                }
            } catch (err) {
                console.error(err);
                if (err.name !== 'NotAllowedError') {
                    alert('Error: ' + err.message);
                }
            }
        }

        // Hide passkey button if browser doesn't support it
        if (!window.PublicKeyCredential) {
            document.getElementById('passkey-section').style.display = 'none';
        }
    </script>
</body>
</html>
